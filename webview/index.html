<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';" />
  <link rel="stylesheet" href="{{stylesUri}}" />
  <link rel="stylesheet" href="{{highlightUri}}" />
</head>
<body>
  <div id="app">
    <div class="header">
      <span class="header-title">AI Agent</span>
      <select id="modeSelect" class="mode-select">
        <option value="agent">Agent</option>
        <option value="plan">Plan</option>
        <option value="ask">Ask</option>
      </select>
      <button id="settingsBtn" class="header-btn" title="Settings">&#x2699;</button>
      <button id="clearBtn" class="header-btn" title="New Chat">&#x2715;</button>
    </div>

    <div id="settingsPanel" class="settings-panel" style="display:none">
      <h3>Settings</h3>

      <div class="settings-group">
        <label for="settingsProvider">Provider</label>
        <select id="settingsProvider">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="azure">Azure OpenAI</option>
          <option value="azureFoundry">Azure AI Foundry</option>
          <option value="bedrock">AWS Bedrock</option>
        </select>
      </div>

      <div class="settings-group">
        <label for="settingsModel">Model</label>
        <input type="text" id="settingsModel" placeholder="e.g. gpt-4o, claude-sonnet-4-20250514" />
      </div>

      <div class="settings-group">
        <label for="settingsApiKey">API Key</label>
        <input type="password" id="settingsApiKey" placeholder="Paste key (stored securely)" />
        <div class="settings-hint">Leave empty to keep existing key</div>
      </div>

      <div class="settings-divider"></div>

      <div id="azureSettingsGroup" style="display:none">
        <div class="settings-group">
          <label for="settingsEndpoint">Azure Endpoint</label>
          <input type="text" id="settingsEndpoint" placeholder="https://myresource.openai.azure.com" />
        </div>
        <div class="settings-group">
          <label for="settingsDeployment">Deployment Name</label>
          <input type="text" id="settingsDeployment" placeholder="my-gpt4-deployment" />
        </div>
        <div class="settings-group">
          <label for="settingsApiVersion">API Version</label>
          <input type="text" id="settingsApiVersion" placeholder="2024-10-21" />
        </div>
      </div>

      <div id="foundrySettingsGroup" style="display:none">
        <div class="settings-group">
          <label for="settingsFoundryEndpoint">Foundry Server URL</label>
          <input type="text" id="settingsFoundryEndpoint" placeholder="https://my-model.eastus.models.ai.azure.com" />
        </div>
        <div class="settings-group">
          <label for="settingsFoundryModel">Model Name (optional)</label>
          <input type="text" id="settingsFoundryModel" placeholder="Leave empty for default" />
        </div>
      </div>

      <div id="awsSettingsGroup" style="display:none">
        <div class="settings-group">
          <label for="settingsAwsRegion">AWS Region</label>
          <input type="text" id="settingsAwsRegion" placeholder="us-east-1" />
        </div>
        <div class="settings-group">
          <label for="settingsAwsModel">Bedrock Model ID</label>
          <input type="text" id="settingsAwsModel" placeholder="anthropic.claude-3-5-sonnet..." />
        </div>
        <div class="settings-group">
          <label for="settingsAwsAccessKey">AWS Access Key ID</label>
          <input type="password" id="settingsAwsAccessKey" placeholder="Paste key" />
        </div>
        <div class="settings-group">
          <label for="settingsAwsSecretKey">AWS Secret Access Key</label>
          <input type="password" id="settingsAwsSecretKey" placeholder="Paste key" />
        </div>
      </div>

      <div class="settings-actions">
        <button id="settingsSaveBtn">Save</button>
      </div>
    </div>

    <div id="messages" class="messages">
      <div class="welcome" id="welcome">
        <h2>AI Coding Agent</h2>
        <p>Ask questions, plan changes, or let the agent code for you. Select a mode above to get started.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="input"
          class="input-box"
          placeholder="Type your message..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn">Send</button>
      </div>
      <div class="input-hint">Shift+Enter for new line</div>
    </div>
  </div>

  <script nonce="{{nonce}}">
    {{hljsScript}}
  </script>
  <script nonce="{{nonce}}">
    {{mainScript}}
  </script>
</body>
</html>
