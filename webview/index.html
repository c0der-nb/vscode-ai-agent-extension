<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';" />
  <link rel="stylesheet" href="{{stylesUri}}" />
  <link rel="stylesheet" href="{{highlightUri}}" />
</head>
<body>
  <div id="app">
    <div class="header">
      <span class="header-title">AI Agent</span>
      <select id="modeSelect" class="mode-select">
        <option value="agent">Agent</option>
        <option value="plan">Plan</option>
        <option value="ask">Ask</option>
      </select>
      <button id="clearBtn" class="header-btn" title="New Chat">&#x2715;</button>
    </div>

    <div id="messages" class="messages">
      <div class="welcome" id="welcome">
        <h2>AI Coding Agent</h2>
        <p>Ask questions, plan changes, or let the agent code for you. Select a mode above to get started.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="input"
          class="input-box"
          placeholder="Type your message..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn">Send</button>
      </div>
      <div class="input-hint">Shift+Enter for new line</div>
    </div>
  </div>

  <script nonce="{{nonce}}">
    {{mainScript}}
  </script>
</body>
</html>
